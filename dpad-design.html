<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-Pad Design</title>
<style>
  body {
    background: #0A0A14;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: white;
  }

  .dpad-container {
    position: relative;
    width: 260px;
    height: 260px;
  }

  svg.dpad-svg {
    width: 260px;
    height: 260px;
    filter: drop-shadow(0 4px 20px rgba(0,0,0,0.6));
  }

  .zone {
    fill: #1E1E30;
    stroke: #0A0A14;
    stroke-width: 2;
    cursor: pointer;
    transition: fill 0.15s;
  }
  .zone:hover {
    fill: #2E2E48;
  }

  .ok-btn {
    fill: #3366CC;
    cursor: pointer;
    transition: fill 0.15s;
    filter: drop-shadow(0 2px 8px rgba(51,102,204,0.5));
  }
  .ok-btn:hover {
    fill: #2855aa;
  }

  .ok-text {
    fill: white;
    font-size: 16px;
    font-weight: 600;
    pointer-events: none;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .arrow {
    fill: #8888BB;
    pointer-events: none;
  }

  .label {
    fill: #555577;
    font-size: 11px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    pointer-events: none;
    text-anchor: middle;
  }

  h2 {
    color: #aaa;
    text-align: center;
    margin-bottom: 40px;
    font-weight: 400;
  }

  .wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .description {
    color: #777;
    font-size: 13px;
    text-align: center;
    max-width: 300px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="wrapper">
  <h2>D-Pad Design Preview</h2>

  <div class="dpad-container">
    <svg class="dpad-svg" viewBox="0 0 260 260">
      <defs>
        <clipPath id="circleClip">
          <circle cx="130" cy="130" r="128" />
        </clipPath>
      </defs>

      <!-- Circle background -->
      <circle cx="130" cy="130" r="128" fill="#1E1E30" stroke="#0A0A14" stroke-width="2" />

      <!--
        Square OK button: 70x70, centered at (130,130)
        Corners: TL(95,95) TR(165,95) BL(95,165) BR(165,165)
        Lines from corners at 45° diagonals to circle edge.
        All 4 zones are identical symmetrical trapezoids.

        Circle intersections (r=128, 45° diagonals):
        TL → (40, 40)   TR → (220, 40)
        BL → (40, 220)  BR → (220, 220)
      -->

      <g clip-path="url(#circleClip)">
        <!-- UP zone -->
        <path class="zone" d="
          M 95 95
          L 40 40
          A 128 128 0 0 1 220 40
          L 165 95
          Z
        " />

        <!-- RIGHT zone -->
        <path class="zone" d="
          M 165 95
          L 220 40
          A 128 128 0 0 1 220 220
          L 165 165
          Z
        " />

        <!-- DOWN zone -->
        <path class="zone" d="
          M 165 165
          L 220 220
          A 128 128 0 0 1 40 220
          L 95 165
          Z
        " />

        <!-- LEFT zone -->
        <path class="zone" d="
          M 95 165
          L 40 220
          A 128 128 0 0 1 40 40
          L 95 95
          Z
        " />

        <!-- Divider lines from square corners to circle edge -->
        <line x1="95" y1="95" x2="40" y2="40" stroke="#0A0A14" stroke-width="2" />
        <line x1="165" y1="95" x2="220" y2="40" stroke="#0A0A14" stroke-width="2" />
        <line x1="165" y1="165" x2="220" y2="220" stroke="#0A0A14" stroke-width="2" />
        <line x1="95" y1="165" x2="40" y2="220" stroke="#0A0A14" stroke-width="2" />
      </g>

      <!-- Circle border (on top) -->
      <circle cx="130" cy="130" r="128" fill="none" stroke="#0A0A14" stroke-width="2" />

      <!-- Arrow indicators -->
      <!-- Up arrow -->
      <polygon class="arrow" points="130,30 122,45 138,45" />
      <!-- Down arrow -->
      <polygon class="arrow" points="130,230 122,215 138,215" />
      <!-- Left arrow -->
      <polygon class="arrow" points="30,130 45,122 45,138" />
      <!-- Right arrow -->
      <polygon class="arrow" points="230,130 215,122 215,138" />

      <!-- OK square button -->
      <rect class="ok-btn" x="95" y="95" width="70" height="70" rx="10" ry="10" />
      <text class="ok-text" x="130" y="136" text-anchor="middle">OK</text>

    </svg>
  </div>

  <div class="description">
    Circle with square OK in center.<br>
    4 diagonal lines from square corners to circle edge<br>
    create 4 identical trapezoid tap zones for Up/Down/Left/Right.
  </div>
</div>
</body>
</html>
